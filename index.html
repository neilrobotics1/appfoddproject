    gtag('config', 'G-2RBRPZ91PD');

  <meta charset="UTF-8" />
  <meta name="google-site-verification" content="YG4O0etOZNB4FmA2GWsF_M5N1hYCtzf25zfKM7GDfTg" />
  <link rel="canonical" href="https://www.fodd.app/" />
  <link rel="preload" href="/assets/FoddLogoTransparent.png" as="image" type="image/png" />
  <!-- Static Favicon for Google Search -->
  <link rel="icon" type="image/png" href="/assets/FoddLogoJustEgg.png" />
  <link rel="icon" id="dynamic-favicon" type="image/png" href="/assets/FoddLogoJustEgg.png" />
  <script>
    (function () {
      const img = new Image();
      img.src = '/assets/FoddLogoJustEgg.png';
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width;
        canvas.height = img.height;
        const ctx = canvas.getContext('2d');
        const r = Math.min(img.width, img.height) * 0.25; // 25% border radius
        ctx.beginPath();
        ctx.moveTo(r, 0);
        ctx.lineTo(img.width - r, 0);
        ctx.quadraticCurveTo(img.width, 0, img.width, r);
        ctx.lineTo(img.width, img.height - r);
        ctx.quadraticCurveTo(img.width, img.height, img.width - r, img.height);
        ctx.lineTo(r, img.height);
        ctx.quadraticCurveTo(0, img.height, 0, img.height - r);
        ctx.lineTo(0, r);
        ctx.quadraticCurveTo(0, 0, r, 0);
        ctx.closePath();
        ctx.clip();
        ctx.drawImage(img, 0, 0);
        const link = document.getElementById('dynamic-favicon');
        if (link) link.href = canvas.toDataURL('image/png');
      };
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Fodd — The fully personalized food scanner tailored to your specific dietary and health profile. Join the waitlist today." />
